name: Swift

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v5

    - name: Select latest stable Xcode
      run: |
        LATEST_XCODE=$(ls -1d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
        echo "Using $LATEST_XCODE"
        sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
        xcodebuild -version
        swift --version

    - name: Build (SPM)
      run: swift build

    - name: Build (iOS)
      run: xcodebuild build -scheme SwiftyChat -destination 'generic/platform=iOS Simulator' -quiet

    - name: Build (macOS)
      run: xcodebuild build -scheme SwiftyChat -destination 'generic/platform=macOS' -quiet
